<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Technician</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <h1>ASSESSMENT TECHNICIAN</h1>
        <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <span id="progressText">0%</span>
    </header>

    <!-- =========================
        SLIDE 1 IDENTITAS
    ========================== -->

    <section id="page-identitas" class="page active">

        <div class="card">

            <h2>Identitas Peserta</h2>

            <label>Nama Peserta</label>
            <input type="text" id="nama">

            <label>NIK</label>
            <input type="text" id="nik">

            <label>Perusahaan</label>
            <input type="text" id="perusahaan">

            <label>Jabatan</label>
            <input type="text" id="jabatan">

            <button onclick="nextToInstruction()">Lanjut</button>

        </div>

    </section>

    <!-- =========================
        SLIDE 2 PETUNJUK
    ========================== -->

    <section id="page-petunjuk" class="page">

        <div class="card">

            <h2>Petunjuk Pengisian</h2>

            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                width="180">

            <ul>
                <li>Bacalah soal dengan teliti.</li>
                <li>Pilih satu jawaban yang paling benar.</li>
                <li>Semua soal wajib dijawab.</li>
                <li>Gunakan tombol Next dan Back.</li>
                <li>Tekan Submit setelah selesai.</li>
            </ul>

            <button onclick="startExam()">
                Mulai Assessment
            </button>

        </div>

    </section>

    <!-- =========================
        HALAMAN SOAL
    ========================== -->

    <section id="page-soal" class="page">

        <div class="card">

            <h2>Soal Assessment</h2>

            <div id="questionContainer">

            </div>

            <div class="navigation">

                <button onclick="prevQuestion()">
                    ◀ Back
                </button>

                <button onclick="nextQuestion()">
                    Next ▶
                </button>

            </div>

            <br>

            <button class="submit-btn"
                onclick="submitExam()">
                Submit Assessment
            </button>

        </div>

    </section>

    <!-- =========================
        HASIL
    ========================== -->

    <section id="page-result" class="page">

        <div class="card">

            <h2>Hasil Assessment</h2>

            <h3 id="hasilNama"></h3>

            <p id="hasilNilai"></p>

            <p id="hasilBenar"></p>

            <p id="hasilSalah"></p>

            <p id="hasilStatus"></p>

        </div>

    </section>

    <script src="questions.js"></script>

    <script src="script.js"></script>

</body>

</html>
